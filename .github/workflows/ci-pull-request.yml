name: CI Workflow Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - master
    paths:
      - ".github/**"
jobs:
  Builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        name: Build
      - run: npm test
        name: Test
